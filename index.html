<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome IPTV - Premium Live Player</title>

    <!-- HLS Player Library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- FontAwesome Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-dark: #07080d;
            --bg-gradient: radial-gradient(circle at top, #14162e 0%, #07080d 100%);
            --accent: #00e5ff;
            --accent-rgb: 0, 229, 255;
            --accent-alt: #7c4dff;
            --accent-alt-rgb: 124, 77, 255;
            --accent-green: #00e676;
            --text-color: #f0f2f5;
            --text-muted: #8c92ac;

            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.06);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --font-family: 'Inter', sans-serif;
            --font-title: 'Outfit', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.darkmode {
            --bg-gradient: linear-gradient(180deg, #121212 0%, #0a0a0a 100%);
            --bg-dark: #0a0a0a;
            --accent: #e0e0e0;
            --accent-rgb: 224, 224, 224;
            --accent-alt: #444444;
            --accent-alt-rgb: 68, 68, 68;
            --card-bg: #161616;
            --card-border: #282828;
            --card-shadow: none;
            --btn-bg: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            color: var(--text-color);
            font-family: var(--font-family);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(7, 8, 13, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            font-family: var(--font-title);
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-alt), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--accent);
            filter: drop-shadow(0 0 8px rgba(var(--accent-rgb), 0.6));
            -webkit-text-fill-color: initial;
        }

        #themeToggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            transition: var(--transition);
        }

        #themeToggle:hover {
            background: var(--btn-bg);
            border-color: var(--accent);
            transform: scale(1.08);
            box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.2);
        }

        /* LAYOUT CONTAINERS */
        .app-layout {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: var(--transition);
        }

        /* ROW 1: PLAYER & RELATED SECTION */
        .player-section {
            display: flex;
            align-items: stretch;
            gap: 20px;
            width: 100%;
            transition: var(--transition);
        }

        .player-wrapper {
            flex: 0 0 75%;
            position: relative;
            transition: var(--transition);
        }

        .player-box {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: var(--card-shadow), 0 0 25px rgba(var(--accent-alt-rgb), 0.15);
            border: 1px solid rgba(var(--accent-alt-rgb), 0.15);
            aspect-ratio: 16/9;
            transition: var(--transition);
        }

        video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
            display: block;
        }

        /* CONTROLS OVERLAY (CENTERED & BUFFERING) */
        .custom-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .player-box:hover .custom-controls,
        .custom-controls.active {
            opacity: 1;
            pointer-events: auto;
        }

        .control-btn {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            color: #07080d;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.4);
            transition: var(--transition);
        }

        .control-btn:hover {
            transform: scale(1.15);
            background: #ffffff;
            box-shadow: 0 0 20px #ffffff;
        }

        /* BOTTOM PLAYER BAR */
        .player-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 12;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .player-box:hover .player-bar,
        .player-bar.active {
            opacity: 1;
            transform: translateY(0);
        }

        .player-bar-left,
        .player-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bar-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            opacity: 0.8;
            transition: var(--transition);
        }

        .bar-btn:hover {
            opacity: 1;
            color: var(--accent);
            transform: scale(1.1);
        }

        .bar-title {
            font-size: 13px;
            font-weight: 500;
            color: #f0f2f5;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-left: 6px;
            opacity: 0.9;
        }

        /* PLAYER SPINNER */
        .player-spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            font-size: 38px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.5);
            pointer-events: none;
        }

        /* RELATED SECTION (25% SIDEBAR) */
        .related-section {
            flex: 0 0 calc(25% - 20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
        }

        .related-header {
            font-family: var(--font-title);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .related-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            min-height: 0;
            /* Prevents flex overflow */
        }

        .related-item {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 6px 12px;
            cursor: pointer;
            transition: var(--transition);
            min-height: 0;
        }

        .related-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .related-item img {
            height: 80%;
            width: auto;
            aspect-ratio: 4/3;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
        }

        .related-info {
            flex: 1;
            min-width: 0;
        }

        .related-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .related-group {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Hide related items 5 and 6 on PC standard mode to fit 4 exactly */
        .related-grid .related-item:nth-child(n+5) {
            display: none;
        }

        /* THEATER MODE OVERRIDES */
        .theater-mode .player-section {
            flex-direction: column;
            gap: 16px;
        }

        .theater-mode .player-wrapper {
            flex: 0 0 100%;
            width: 100%;
        }

        .theater-mode .related-section {
            flex: 0 0 100%;
            width: 100%;
            height: auto;
        }

        .theater-mode .related-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            height: auto;
            flex: none;
        }

        .theater-mode .related-item {
            flex: none;
            height: 72px;
        }

        /* Show items 5 and 6 in theater mode */
        .theater-mode .related-grid .related-item:nth-child(n+5) {
            display: flex;
        }

        /* ROW 2: SEARCH, CATEGORIES, CHANNELS */
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        /* ROW 3: FOOTER & SOCIAL FEEDBACK SECTION */
        .footer-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--card-border);
        }

        /* SEARCH */
        .search-box {
            width: 100%;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            font-size: 15px;
            font-family: var(--font-family);
            border: 1px solid var(--card-border);
            outline: none;
            border-radius: 16px;
            background: var(--card-bg);
            color: var(--text-color);
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        /* GROUP TABS */
        .group-tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 4px 0;
            background: transparent;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .group-tabs::-webkit-scrollbar {
            display: none;
        }

        .group-tab {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
            font-family: var(--font-family);
        }

        .group-tab:hover {
            background: var(--btn-bg);
            border-color: rgba(var(--accent-rgb), 0.4);
            transform: translateY(-1px);
        }

        .group-tab.active-tab {
            background: linear-gradient(90deg, var(--accent-alt), var(--accent));
            color: #07080d;
            font-weight: 600;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.3);
        }

        /* CHANNEL GRID */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 16px;
            padding-bottom: 30px;
        }

        /* CHANNEL CARD */
        .channel {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            padding: 12px;
            overflow: hidden;
        }

        .channel:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(var(--accent-rgb), 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        .channel img {
            max-width: 85%;
            max-height: 52%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
            transition: var(--transition);
        }

        .channel:hover img {
            transform: scale(1.08);
        }

        .channel-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            color: var(--text-color);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 0 0 18px 18px;
            padding: 6px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* FAV BUTTON */
        .fav-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 15px;
            z-index: 5;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .fav-btn:hover {
            transform: scale(1.25);
            color: #ff1744;
        }

        .fav-btn .fav-active {
            color: #ff1744;
            filter: drop-shadow(0 0 5px rgba(255, 23, 68, 0.5));
        }

        /* ACTIVE CARD */
        .channel.active {
            border-color: var(--accent-green) !important;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3) !important;
            background: rgba(0, 230, 118, 0.05) !important;
        }

        /* LIVE STATS WIDGET */
        .live-counter {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
            background: rgba(7, 8, 13, 0.85);
            border: 1px solid var(--card-border);
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-color);
            backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow), 0 0 15px rgba(var(--accent-rgb), 0.05);
            transition: opacity 0.4s ease, transform 0.4s ease;
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .live-counter .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-counter .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.9);
                opacity: 0.6;
            }
        }

        /* SOCIAL CONTACT & FEEDBACK */
        .contact-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 16px 24px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .contact-title {
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            font-family: var(--font-title);
            margin-bottom: 8px;
        }

        .social-box {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-box a {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            text-decoration: none;
            color: white;
            transition: var(--transition);
        }

        .social-box a:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .telegram {
            background: #229ED9;
            box-shadow: 0 4px 15px rgba(34, 158, 217, 0.3);
        }

        .facebook {
            background: #1877F2;
            box-shadow: 0 4px 15px rgba(24, 119, 242, 0.3);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .footer span {
            color: var(--accent);
            font-weight: 600;
        }

        /* TOP BUTTON */
        #topBtn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 999;
            display: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: rgba(7, 8, 13, 0.85);
            backdrop-filter: blur(20px);
            color: var(--text-color);
            font-size: 15px;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        #topBtn:hover {
            background: var(--btn-bg);
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        /* RESPONSIVE LAYOUT (MOBILE CONFIGURATION) */
        @media (max-width: 899px) {
            .app-layout {
                padding: 12px;
                gap: 16px;
            }

            .player-section {
                flex-direction: column;
                gap: 12px;
            }

            .player-wrapper {
                flex: 0 0 100%;
                width: 100%;
            }

            .related-section {
                flex: 0 0 100%;
                width: 100%;
                height: auto;
            }

            .related-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                height: auto;
                flex: none;
            }

            .related-item {
                flex: none;
                height: 64px;
                padding: 6px 10px;
            }

            /* Show 5th and 6th related channels on mobile */
            .related-grid .related-item:nth-child(n+5) {
                display: flex;
            }

            /* Hide theater mode button on mobile */
            #theaterBtn {
                display: none;
            }

        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1><i class="fa-solid fa-circle-play"></i> Awesome IPTV</h1>
        <button id="themeToggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="app-layout">

        <!-- ROW 1: PLAYER & RELATED CHANNELS -->
        <div class="player-section">

            <!-- Video Player Wrapper (75% on Desktop) -->
            <div class="player-wrapper">
                <div class="player-box">
                    <video id="video" autoplay playsinline controls></video>

                    <!-- Loading Spinner -->
                    <div id="loadingSpinner" class="player-spinner">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </div>

                    <!-- Centered Large Play/Pause Overlay Controls -->
                    <div class="custom-controls">
                        <button class="control-btn" onclick="prevChannel()" title="Previous Channel">
                            <i class="fas fa-backward"></i>
                        </button>
                        <button class="control-btn" onclick="togglePlay()" id="playPauseBtn" title="Play/Pause">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="control-btn" onclick="nextChannel()" title="Next Channel">
                            <i class="fas fa-forward"></i>
                        </button>
                    </div>

                    <!-- YouTube style control bar at bottom -->
                    <div class="player-bar">
                        <div class="player-bar-left">
                            <button class="bar-btn" onclick="prevChannel()" title="Previous Channel"><i
                                    class="fas fa-step-backward"></i></button>
                            <button class="bar-btn" onclick="togglePlay()" id="barPlayPauseBtn" title="Play/Pause"><i
                                    class="fas fa-play"></i></button>
                            <button class="bar-btn" onclick="nextChannel()" title="Next Channel"><i
                                    class="fas fa-step-forward"></i></button>
                            <span class="bar-title" id="barTitle">Loading channel...</span>
                        </div>
                        <div class="player-bar-right">
                            <button class="bar-btn" onclick="toggleTheaterMode()" id="theaterBtn"
                                title="Theater Mode"><i class="fas fa-square"></i></button>
                            <button class="bar-btn" onclick="toggleFullScreen()" id="fullscreenBtn"
                                title="Full Screen"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Related channels sidebar (25% on Desktop) -->
            <div class="related-section">
                <h3 class="related-header"><i class="fas fa-layer-group"></i> Related Channels</h3>
                <div class="related-grid" id="relatedGrid"></div>
            </div>

        </div>

        <!-- ROW 2: SEARCH, CATEGORIES, ALL CHANNELS GRID -->
        <div class="content-section">
            <!-- SEARCH -->
            <div class="search-box">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search Channel..." onkeyup="searchChannels()">
                </div>
            </div>

            <!-- CATEGORIES -->
            <div class="group-tabs" id="groupTabs"></div>

            <!-- CHANNELS GRID -->
            <div class="channel-grid" id="channelGrid"></div>
        </div>

        <!-- ROW 3: FOOTER & SOCIAL FEEDBACK AT THE VERY BOTTOM -->
        <div class="footer-section">
            <!-- FOOTER -->
            <div class="footer">
                © 2026 <span>Awesome IPTV</span>
            </div>
        </div>

    </div>

    <!-- FLOATING LIVE STATS -->
    <div class="live-counter">
        <div class="stat-row">
            <span class="dot"></span>
            <span>Live Users: <strong id="liveUsers">0</strong></span>
        </div>
        <div class="stat-row">
            <i class="far fa-eye" style="color: var(--accent);"></i>
            <span>Total Views: <strong id="totalViews">0</strong></span>
        </div>
    </div>

    <!-- FLOATING SCROLL TOP -->
    <button id="topBtn" title="Back to Top"><i class="fas fa-chevron-up"></i></button>

    <!-- CORE SCRIPTS -->
    <script>
        /* PLAYLIST */
        const playlist = 'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

        let channels = [];
        let filteredChannels = [];
        let currentIndex = 0;
        let currentGroup = 'All';
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

        /* LOAD PLAYLIST */
        fetch(playlist)
            .then(r => r.text())
            .then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const info = lines[i];
                        const url = lines[i + 1] ? lines[i + 1].trim() : '';
                        if (!url) continue;

                        const name = info.split(',')[1] || 'Unknown';
                        let logo = '';
                        const match = info.match(/tvg-logo="(.*?)"/);
                        if (match) { logo = match[1]; }

                        let group = 'Other';
                        const g = info.match(/group-title="(.*?)"/i);
                        if (g) { group = g[1]; }

                        channels.push({
                            name,
                            url,
                            logo,
                            group
                        });
                    }
                }
                buildTabs();
                filteredChannels = channels;
                renderChannels();

                if (channels.length > 0) {
                    playChannel(0);
                }
            });

        /* GROUP NORMALIZATION */
        function normalizeGroup(g) {
            g = (g || '').toLowerCase();
            if (['bangla', 'bangladesh', 'indian bangla', 'inbangla'].includes(g)) return 'Bangla';
            if (g.includes('world cup') || g.includes('fifa world cup')) return '🏆 FIFA World Cup';
            if (g.includes('sport')) return 'Sports';
            if (g.includes('news')) return 'News';
            if (g.includes('movie')) return 'Movies';
            if (g.includes('music')) return 'Music';
            if (g.includes('kid')) return 'Kids';
            if (['english', 'hindi', 'urdhu'].includes(g)) return 'International';
            if (['entertainment', 'drama'].includes(g)) return 'Entertainment';
            return 'Others';
        }

        /* BUILD CATEGORIES */
        function buildTabs() {
            const tabs = document.getElementById('groupTabs');
            const groups = ['All', '❤️ Favorites', 'Bangla', '🏆 FIFA World Cup', 'Sports', 'News', 'Entertainment', 'Movies', 'Music', 'Kids', 'International', 'Others'];
            tabs.innerHTML = groups.map(g => `<button class="group-tab ${g === 'All' ? 'active-tab' : ''}" onclick="filterGroup('${g}', this)">${g}</button>`).join('');
        }

        /* FILTER CHANNELS */
        function filterGroup(group, btn) {
            currentGroup = group;
            document.querySelectorAll('.group-tab').forEach(x => x.classList.remove('active-tab'));
            if (btn) btn.classList.add('active-tab');

            if (group === 'All') {
                filteredChannels = channels;
            } else if (group === '❤️ Favorites') {
                filteredChannels = channels.filter(c => favorites.includes(c.url));
            } else {
                filteredChannels = channels.filter(c => normalizeGroup(c.group) === group);
            }
            renderChannels();
        }

        /* RENDER CHANNELS */
        function renderChannels() {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = '';

            filteredChannels.forEach((ch, index) => {
                const div = document.createElement('div');
                div.className = 'channel';

                const isFav = favorites.includes(ch.url);
                const favIcon = isFav ? '<i class="fa-solid fa-heart fav-active"></i>' : '<i class="fa-regular fa-heart"></i>';

                div.innerHTML = `
                    <div class="fav-btn">${favIcon}</div>
                    <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='images.png'">
                    <div class="channel-name">${ch.name}</div>
                `;

                div.onclick = () => playChannel(channels.indexOf(ch));

                const favBtn = div.querySelector('.fav-btn');
                favBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (favorites.includes(ch.url)) {
                        favorites = favorites.filter(x => x !== ch.url);
                    } else {
                        favorites.push(ch.url);
                    }
                    localStorage.setItem('favorites', JSON.stringify(favorites));

                    if (currentGroup === '❤️ Favorites') {
                        filteredChannels = channels.filter(c => favorites.includes(c.url));
                    }
                    renderChannels();
                });

                grid.appendChild(div);
            });

            // Re-apply active class to currently playing card if visible
            const currentPlaying = channels[currentIndex];
            if (currentPlaying) {
                const cards = document.querySelectorAll('.channel');
                filteredChannels.forEach((ch, idx) => {
                    if (ch.url === currentPlaying.url && cards[idx]) {
                        cards[idx].classList.add('active');
                    }
                });
            }
        }

        /* RENDER RELATED CHANNELS */
        function renderRelated(index) {
            const currentChannel = channels[index];
            if (!currentChannel) return;

            // Filter channels in the same group, excluding the active channel itself
            let related = channels.filter(c => c.group === currentChannel.group && c.url !== currentChannel.url);

            // If less than 6 items are found, fill up with general channels
            if (related.length < 6) {
                const others = channels.filter(c => c.group !== currentChannel.group && c.url !== currentChannel.url);
                related = [...related, ...others];
            }

            related = related.slice(0, 6);

            const grid = document.getElementById('relatedGrid');
            grid.innerHTML = '';

            related.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'related-item';

                div.innerHTML = `
                    <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='images.png'">
                    <div class="related-info">
                        <div class="related-name">${ch.name}</div>
                        <div class="related-group">${ch.group}</div>
                    </div>
                `;

                div.onclick = () => {
                    const origIndex = channels.findIndex(c => c.url === ch.url);
                    if (origIndex !== -1) {
                        playChannel(origIndex);
                    }
                };

                grid.appendChild(div);
            });
        }

        /* PLAY VIDEO CHANNEL */
        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            currentIndex = index;

            const video = document.getElementById('video');
            const channel = channels[index];
            const spinner = document.getElementById('loadingSpinner');

            // Update titles
            document.getElementById('barTitle').innerText = channel.name;

            // Show loader when starting stream
            spinner.style.display = 'block';

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    video.play();
                });
                hls.on(Hls.Events.ERROR, function () {
                    spinner.style.display = 'none';
                });
            } else {
                video.src = channel.url;
                video.play();
            }

            // Render related channels list
            renderRelated(index);

            // Update active states in card list
            document.querySelectorAll('.channel').forEach(el => el.classList.remove('active'));

            const cards = document.querySelectorAll('.channel');
            filteredChannels.forEach((ch, i) => {
                if (ch.url === channel.url && cards[i]) {
                    cards[i].classList.add('active');

                    const rect = cards[i].getBoundingClientRect();
                    const topLimit = 150;
                    if (rect.top < topLimit || rect.bottom > window.innerHeight) {
                        cards[i].scrollIntoView({
                            behavior: 'smooth',
                            block: 'nearest'
                        });
                    }
                }
            });
        }

        /* NAVIGATION & CONTROLS */
        function nextChannel() {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= channels.length) nextIndex = 0;
            playChannel(nextIndex);
        }

        function prevChannel() {
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) prevIndex = channels.length - 1;
            playChannel(prevIndex);
        }

        function togglePlay() {
            const video = document.getElementById('video');
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        /* THEATER MODE TOGGLE */
        function toggleTheaterMode() {
            const appLayout = document.querySelector('.app-layout');
            appLayout.classList.toggle('theater-mode');

            const theaterBtn = document.getElementById('theaterBtn');
            if (appLayout.classList.contains('theater-mode')) {
                theaterBtn.innerHTML = '<i class="fas fa-compress"></i>';
                theaterBtn.setAttribute('title', 'Default Mode');
            } else {
                theaterBtn.innerHTML = '<i class="fas fa-square"></i>';
                theaterBtn.setAttribute('title', 'Theater Mode');
            }
        }

        /* FULLSCREEN TOGGLE WITH MOBILE ROTATION */
        function toggleFullScreen() {
            const playerBox = document.querySelector('.player-box');

            if (!document.fullscreenElement) {
                playerBox.requestFullscreen().then(() => {
                    // Try to lock orientation to landscape on mobile devices
                    if (window.innerHeight > window.innerWidth && screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => {
                            console.log("Orientation lock failed:", err);
                        });
                    }
                }).catch(err => {
                    console.log("Fullscreen request failed:", err);
                });
            } else {
                document.exitFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                }).catch(() => { });
            }
        }

        // Fullscreen state listener to update icons
        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fullscreenBtn');
            if (document.fullscreenElement) {
                btn.innerHTML = '<i class="fas fa-compress-arrows-alt"></i>';
                btn.setAttribute('title', 'Exit Full Screen');
            } else {
                btn.innerHTML = '<i class="fas fa-expand"></i>';
                btn.setAttribute('title', 'Full Screen');
            }
        });

        /* Video event listeners for sync UI */
        const videoEl = document.getElementById('video');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const barPlayPauseBtn = document.getElementById('barPlayPauseBtn');
        const spinner = document.getElementById('loadingSpinner');

        videoEl.addEventListener('play', () => {
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            barPlayPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            spinner.style.display = 'none';
        });
        videoEl.addEventListener('pause', () => {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            barPlayPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
        videoEl.addEventListener('waiting', () => {
            spinner.style.display = 'block';
        });
        videoEl.addEventListener('playing', () => {
            spinner.style.display = 'none';
        });

        /* SEARCH FILTERS */
        function searchChannels() {
            const input = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.channel');

            filteredChannels.forEach((ch, index) => {
                if (cards[index]) {
                    if (ch.name.toLowerCase().includes(input)) {
                        cards[index].style.display = 'flex';
                    } else {
                        cards[index].style.display = 'none';
                    }
                }
            });
        }

        /* AUTO HIDE CONTROLS OVERLAY */
        const controls = document.querySelector('.custom-controls');
        const playerBar = document.querySelector('.player-bar');
        const visitor = document.querySelector('.live-counter');
        let hideTimeout;

        function showUI() {
            controls.classList.add('active');
            playerBar.classList.add('active');
            visitor.style.opacity = '1';
            visitor.style.transform = 'translateY(0)';

            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                controls.classList.remove('active');
                playerBar.classList.remove('active');
                visitor.style.opacity = '0';
                visitor.style.transform = 'translateY(10px)';
            }, 3000);
        }

        // Show UI on interaction
        showUI();
        document.querySelector('.player-box').addEventListener('click', showUI);
        document.querySelector('.player-box').addEventListener('mousemove', showUI);
    </script>

    <!-- FIREBASE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, runTransaction } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2L1dayNYWlDz6dKc3a_N0eoyDaLSlPj0",
            authDomain: "rakib-iptv.firebaseapp.com",
            databaseURL: "https://rakib-iptv-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rakib-iptv",
            storageBucket: "rakib-iptv.firebasestorage.app",
            messagingSenderId: "299021620847",
            appId: "1:299021620847:web:20e1cd003d9c6ced815f9a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        /* UNIQUE USER */
        const userId = Date.now() + "_" + Math.random().toString(36).substring(2, 8);
        const userRef = ref(db, 'liveUsers/' + userId);

        /* USER ONLINE */
        set(userRef, {
            online: true,
            time: Date.now()
        });

        /* AUTO REMOVE */
        onDisconnect(userRef).remove();

        /* LIVE USERS COUNT */
        onValue(ref(db, 'liveUsers'), (snapshot) => {
            const data = snapshot.val();
            const count = data ? Object.keys(data).length : 0;
            document.getElementById('liveUsers').innerText = count;
        });

        /* TOTAL VIEWS */
        const totalRef = ref(db, 'totalViews');

        if (!localStorage.getItem('viewed')) {
            runTransaction(totalRef, (current) => {
                return (current || 0) + 1;
            }).then(() => {
                localStorage.setItem('viewed', 'yes');
            });
        }

        /* SHOW TOTAL */
        onValue(totalRef, (snapshot) => {
            const total = snapshot.val() || 0;
            document.getElementById('totalViews').innerText = total;
        });
    </script>

    <!-- THEME TOGGLE & TO-TOP SCRIPT -->
    <script>
        (function () {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;

            if (localStorage.getItem('darkmode') === 'on') {
                document.body.classList.add('darkmode');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }

            btn.onclick = function () {
                document.body.classList.toggle('darkmode');
                const isDark = document.body.classList.contains('darkmode');
                localStorage.setItem('darkmode', isDark ? 'on' : 'off');
                btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            };
        })();

        // Scroll to Top
        const topBtn = document.getElementById('topBtn');
        topBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        window.addEventListener('scroll', () => {
            topBtn.style.display = window.scrollY > 300 ? 'block' : 'none';
        });
    </script>
